name: Monitoreo Automatico

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitoring
        run: python monitoreo.py

      - name: Commit Excel
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add base_monitoreo.xlsx
          git commit -m "Actualizacion automatica monitoreo" || echo "Sin cambios"
          git push
